<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COLOSSO LANDING</title>
  <style>
    :root {
      --bg1: #0f172a; 
      --bg2: #071330; 
      --card: #0b1220;
      --accent1: #850000; 
      --accent2: #d40606; 
      --glass: rgba(255,255,255,0.06);
      --muted: rgba(255,255,255,0.65);
    }
    
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(800px 400px at 10% 15%, rgba(124,58,237,0.12), transparent 8%),
                  radial-gradient(700px 350px at 90% 85%, rgba(6,182,212,0.08), transparent 8%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 48px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-y: auto;
      position: relative;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Animación de entrada para la tarjeta */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      width: 100%; 
      max-width: 420px; 
      border-radius: 18px; 
      padding: 28px; 
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow: 0 10px 30px rgba(2,6,23,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      margin: auto;
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Animación del Avatar (Latido suave) */
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 15px rgba(212, 6, 6, 0.4); }
      50% { box-shadow: 0 0 25px rgba(212, 6, 6, 0.7); }
      100% { box-shadow: 0 0 15px rgba(212, 6, 6, 0.4); }
    }

    .avatar {
      width: 110px; height: 110px; margin: 0 auto 14px; border-radius: 999px; overflow: hidden; 
      border: 4px solid transparent;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      animation: pulseGlow 3s infinite alternate;
    }
    
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 999px; }
    
    h1 { margin: 8px 0 4px; font-size: 20px; letter-spacing: 0.5px; font-weight: 700; }
    p.bio { margin: 0 0 22px; font-size: 14px; line-height: 1.5; }

    .links { display: flex; flex-direction: column; gap: 14px; }
    
    .link-btn {
      display: flex; gap: 14px; align-items: center; text-decoration: none; padding: 14px 18px; border-radius: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); 
      border: 1px solid rgba(255,255,255,0.05);
      /* Transición más suave para el hover */
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      color: inherit;
    }
    
    /* Efecto Hover mejorado */
    .link-btn:hover { 
      transform: translateY(-5px) scale(1.02); 
      box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.1); 
      background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.15);
    }

    .link-icon {
      width: 32px; height: 32px; flex: 0 0 32px; display: inline-grid; place-items: center; border-radius: 8px; background: var(--glass);
      overflow: hidden;
    }
    
    .link-icon img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
    .link-text { flex: 1; text-align: left; font-weight: 500; font-size: 15px; }

    .footer { margin-top: 24px; font-size: 13px; color: var(--muted); }

    h1, p, .link-text, .footer {
      color: #fff;
      text-shadow:
        -0.75px -0.75px 0 #000,
         0.75px -0.75px 0 #000,
        -0.75px  0.75px 0 #000,
         0.75px  0.75px 0 #000;
    }

    @media (max-width: 480px) { body { padding: 24px; } .card { padding: 24px 20px; } }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline class="bg-video">
    <source src="bg-video.mp4" type="video/mp4">
  </video>

  <main class="card">
    <div class="avatar">
      <img src="colosso_logo.jpg" alt="Colosso Logo">
    </div>
    <h1>COLOSSO PERFUMERY</h1>
    <p class="bio"> La firma de la grandeza.<br> 
      💎 Fragancias que te definen.<br>
      | Tienda en línea desde TGU, Honduras. 📍<br><br>
      Todos los links a nuestras <strong>Redes Sociales</strong> aquí ↓
    </p>

    <nav class="links" aria-label="Enlaces principales">
      <a class="link-btn" href="https://www.instagram.com/colosso_perfumery/" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="ins_logo.png" alt="instagram">
        </span>
        <span class="link-text">Instagram</span>
      </a>
      
      <a class="link-btn" href="https://www.tiktok.com/@colossoperfumery?_t=ZM-906wn86Xciq&_r=1" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="tiktok-logo.webp" alt="tiktok">
        </span>
        <span class="link-text">Tiktok</span>
      </a>
      
      <a class="link-btn" href="https://heyzine.com/flip-book/f77a4a4eff.html" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="barcolosso.png" alt="PDF">
        </span>
        <span class="link-text">Catálogo perfumería 2026</span>
      </a>
    </nav>
      
    <div class="footer">✨ EN <strong>COLOSSO</strong> Descubre tu esencia 💎</div>
  </main>
</body>
</html>
