<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COLOSSO LANDING</title>
  <style>
    :root{
      --bg1:#0f172a; /* slate-900 */
      --bg2:#071330; /* deep blue */
      --card:#0b1220;
      --accent1:#850000; /* red */
      --accent2:#d40606; /* rojito */
      --glass: rgba(255,255,255,0.06);
      --muted: rgba(255,255,255,0.65);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(800px 400px at 10% 15%, rgba(124,58,237,0.12), transparent 8%),
                  radial-gradient(700px 350px at 90% 85%, rgba(6,182,212,0.08), transparent 8%),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      display: flex;
      justify-content: center;
      padding: 48px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-y: auto;
      position: relative;
    }
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .card{
      width:100%; max-width:420px; border-radius:18px; padding:28px; background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.04);
      text-align:center;
      margin: auto;
    }
    .avatar{
      width:110px; height:110px; margin:0 auto 14px; border-radius:999px; overflow:hidden; border:4px solid linear-gradient(45deg,var(--accent1),var(--accent2));
      display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--accent1),var(--accent2));
      box-shadow: 0 6px 18px rgba(7,12,23,0.6);
    }
    .avatar img{width:100%; height:100%; object-fit:cover; display:block}
    h1{margin:8px 0 4px; font-size:20px; letter-spacing:0.2px}
    p.bio{margin:0 0 18px; font-size:14px}

    .links{display:flex; flex-direction:column; gap:12px}
    .link-btn{
      display:flex; gap:12px; align-items:center; text-decoration:none; padding:12px 16px; border-radius:12px;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03);
      transition: transform .14s ease, box-shadow .14s ease;
      color:inherit;
    }
    .link-btn:hover{ transform: translateY(-4px); box-shadow: 0 12px 30px rgba(2,6,23,0.5) }
    .link-icon{
      width:28px; height:28px; flex:0 0 28px; display:inline-grid; place-items:center; border-radius:8px; background:var(--glass);
      object-fit: cover;
    }
    .link-icon img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }
    .link-text{flex:1; text-align:left}
    .small{font-size:13px; color:var(--muted)}

    .footer{margin-top:18px; font-size:13px; color:var(--muted)}

    h1, p, .link-text, .footer {
      color: #fff;
      text-shadow:
        -0.75px -0.75px 0 #000, /* arriba izquierda */
         0.75px -0.75px 0 #000, /* arriba derecha */
        -0.75px  0.75px 0 #000, /* abajo izquierda */
         0.75px  0.75px 0 #000; /* abajo derecha */
    }

    /* responsive */
    @media (max-width:480px){ body{padding:24px} .card{padding:20px} }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline class="bg-video">
    <source src="bg-video.mp4" type="video/mp4">
  </video>

  <main class="card">
    <div class="avatar">
      <img src="colosso_logo.jpg" alt="avatar">
    </div>
    <h1>COLOSSO PERFUMERY</h1>
    <p class="bio"> La firma de la grandeza. 
💎 Fragancias que te definen.
| Tienda en línea desde TGU, Honduras. 📍
Todos los links a nuestras <strong>Redes Sociales</strong> aquí ↓.
    </p>

    <nav class="links" aria-label="Enlaces principales">
      <a class="link-btn" href="https://www.instagram.com/colosso_perfumery/" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="ins_logo.png" alt="instagram">
        </span>
        <span class="link-text">Instagram</span>
      </a>
      <a class="link-btn" href="https://www.tiktok.com/@colossoperfumery?_t=ZM-906wn86Xciq&_r=1" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="tiktok-logo.webp" alt="tiktok">
        </span>
        <span class="link-text">Tiktok</span>
      </a>
      
      <a class="link-btn" href="https://heyzine.com/flip-book/f77a4a4eff.html" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden>
          <img src="barcolosso.png" alt="PDF">
        </span>
        <span class="link-text">Catálogo perfumería 2026</span>
      </a>
    </nav>
      
    <div class="footer">✨ EN <strong>COLOSSO</strong> Descubre tu esencia 💎</div>
  </main>
</body>
</html>
